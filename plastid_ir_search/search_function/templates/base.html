<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
      <title>{% block title %}Organelle Search{% endblock %}</title>
   </head>


   <body style="min-height: 100vh; display: flex; flex-direction: column; background-image: url(https://images.pexels.com/photos/29295558/pexels-photo-29295558.jpeg);">
      <header style="padding: 3vh 0;">
         <div class="container">
            <nav class="navbar navbar-expand bg-dark navbar-dark rounded-3" style="font-size: 1.5vw;">
               <div class="container-fluid">
                  <ul class="navbar-nav">
                     <li class="nav-item">
                        <a class="nav-link active">Change Password</a>
                     </li>
                     <li class="nav-item">
                           <button class="nav-link btn btn-link" type="submit">
                           <i class="fa fa-sign-out-alt"></i> Log Out
                           </button>
                     </li>
                     <li class="nav-item"><a class="nav-link"><i class="fa fa-user-plus"></i> Register</a></li>
                     <li class="nav-item"><a class="nav-link"><i class="fa fa-key"></i> Password Reset</a></li>
                     <li class="nav-item"><a class="nav-link"><i class="fa fa-sign-in-alt"></i> Log In</a></li>
                  </ul>
               </div>
               <div class="container-fluid justify-content-end">
                  <ul class="navbar-nav">
                  </ul>
               </div>
            </nav>


            <div class="rounded-3 text-center" style="background: linear-gradient(#E3F70C, #318A11);">
                <a>
                <img class="img-fluid mx-auto d-block" src="{% static 'OrganelleSearchFront.png' %}" style="padding: 10px;">
                </a>
                {% block header %}
                {% endblock %}
            </div>
         </div>
      </header>


      <main style="flex: 1; padding: 3vh 0;">
         <div class="container px-lg-5">
            <div class="p-4 p-lg-5 bg-light rounded-3 text-center" style="background: linear-gradient(#E3F70C, #318A11);">
               <div class="mb-4 mb-lg-5" style="min-height: 60vh">
                  <div class="container">
    <div class="row align-items-start">
        <div class="col-md-12">
            {% block search %}
            {% endblock %}
        </div>
    </div>
</div>
                  {% block content %}
                  {% endblock %}
               </div>
            </div>
         </div>
      </main>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
   </body>
</html>
